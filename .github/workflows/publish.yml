
name: Build and Publish Container Image

on:
  push:
    branches:
      - main # Adjust this branch name if your primary branch is different
  pull_request:
    branches:
      - main

env:
  # Target the SDK version used by your project (net10.0)
  DOTNET_VERSION: '10.0.x'
  # GitHub Container Registry URL
  DOCKER_REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build base image
      run: docker build -t ghcr.io/agrabski/dev-image:latest -f Dockerfile.base .
    - name: push base image
      run: docker push ghcr.io/agrabski/dev-image:latest
    - name: Build and publish container image
      run: dotnet publish --os linux /t:PublishContainer --self-contained true -c Release /p:ContainerImageTag=latest


